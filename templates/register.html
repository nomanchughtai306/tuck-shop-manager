{% extends "base.html" %}
{% block title %}Register - Loan Tracker{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 20px;
    }
    .auth-card {
        background: var(--bg-card);
        padding: 2.5rem;
        border-radius: var(--radius);
        width: 100%;
        max-width: 450px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: var(--shadow-md);
    }
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-header h2 { color: var(--text-main); }
    .auth-header p { color: var(--text-muted); font-size: 0.9rem; }

    .form-group label { color: var(--text-main); display: block; margin-bottom: 8px; font-weight: 500; }
    
    .auth-input {
        width: 100%;
        padding: 12px;
        background: #000;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: white;
        margin-bottom: 1.2rem;
    }
    .auth-input:focus { outline: none; border-color: var(--accent); }

    .footer-link {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--text-muted);
    }
    .footer-link a { color: var(--accent); font-weight: 600; }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Create Account 📝</h2>
            <p>Join Loan Tracker to manage your business</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="auth-input" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="auth-input" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="auth-input" placeholder="Create a strong password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Sign Up</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
